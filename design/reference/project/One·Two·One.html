<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>One·Two·One — Darts Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #05050A; font-family: 'Archivo', sans-serif; }
  body { overflow-x: hidden; }

  button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
  button:focus-visible { outline: 2px solid oklch(0.64 0.22 25); outline-offset: 2px; }

  input:focus-visible { outline: none; }

  /* date picker styling */
  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.8);
    cursor: pointer;
  }

  ::-webkit-scrollbar { width: 0; height: 0; }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  @keyframes confettiFly {
    0% {
      opacity: 1;
      transform: translate(0, 0) scale(1);
    }
    100% {
      opacity: 0;
      transform: rotate(var(--angle)) translateY(calc(var(--dist) * -1)) scale(0.5);
    }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* focus pulses */
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 oklch(0.64 0.22 25 / 0.35); }
    50% { box-shadow: 0 0 0 8px oklch(0.64 0.22 25 / 0); }
  }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#0A0A0B"/>
  <circle cx="50" cy="50" r="24" fill="none" stroke="#fff" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="50" cy="50" r="14" fill="none" stroke="#fff" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="50" cy="50" r="6" fill="oklch(0.64 0.22 25)"/>
  <circle cx="50" cy="50" r="2" fill="#fff"/>
</svg>
</template>
